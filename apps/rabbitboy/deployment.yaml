apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitboy-static
  namespace: rabbitboy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rabbitboy-static
  template:
    metadata:
      labels:
        app: rabbitboy-static
    spec:
      containers:
        - name: rabbitboy-static
          image: rabbitboy0134/rabbitboy-static:sha-672b104
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5